version: 2
updates:
  # Backend dependencies (production and development combined)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      backend-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    reviewers:
      - "talberry"
    assignees:
      - "talberry"

  # Frontend dependencies (production and development combined)
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      frontend-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Defer Vite 8+ until Tailwind's stable Vite plugin supports it
      - dependency-name: "vite"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@vitejs/plugin-react"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "@tailwindcss/vite"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "vitest"
        update-types:
          - "version-update:semver-major"
      # Pin until plugins (react, import, typescript-eslint) support ESLint 10
      - dependency-name: "eslint"
      - dependency-name: "@eslint/js"
    reviewers:
      - "talberry"
    assignees:
      - "talberry"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 2
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    reviewers:
      - "talberry"
    assignees:
      - "talberry"
